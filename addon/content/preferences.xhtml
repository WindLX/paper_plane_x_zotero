<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
  <html:link rel="stylesheet" href="chrome://__addonRef__/content/preferences.css" />
</linkset>
<groupbox
  class="ppx-pref-shell"
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <html:div class="ppx-pref-card">
    <html:div class="ppx-pref-header">
      <html:h2 data-l10n-id="pref-title"></html:h2>
      <html:p data-l10n-id="pref-description"></html:p>
    </html:div>

    <html:div class="ppx-pref-row">
      <html:label
        class="ppx-pref-label"
        for="zotero-prefpane-__addonRef__-paperPlaneBaseURL"
        data-l10n-id="pref-paperplane-base-url"
      ></html:label>
      <html:input
        class="ppx-pref-input"
        type="text"
        id="zotero-prefpane-__addonRef__-paperPlaneBaseURL"
        preference="paperPlaneBaseURL"
        data-pref-key="paperPlaneBaseURL"
      ></html:input>
      <html:p
        class="ppx-pref-hint"
        data-l10n-id="pref-paperplane-base-url-hint"
      ></html:p>
    </html:div>
  </html:div>
</groupbox>
